# Setting type: Single
# Default value: 1
General Settings - Minimum Dungeon Size Multiplier = 1

## If The Level's Dungeon Size Multiplier Is Above This Value, The Size Multiplier Will Be Restricted Based On The RestrictDungeonSizeScaler Setting
# Setting type: Single
# Default value: 1
General Settings - Maximum Dungeon Size Multiplier = 1

## If The Level's Dungeon Size Multiplier Is Above Or Below The Previous Two Settings, The Dungeon Size Multiplier Will Be Set To The Value Between The Level's Dungeon Size Multiplier And This Value.
