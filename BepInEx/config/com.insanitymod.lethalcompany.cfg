## Settings file was created by plugin InsanityMod v1.0.5
## Plugin GUID: com.insanitymod.lethalcompany

[General]

## Display language. AUTO detects from system locale. Options: AUTO, EN, KO.
# Setting type: String
# Default value: AUTO
Language = AUTO

[Insanity]

## Insanity gained per second inside the facility (baseline, ~10 min solo to 100%).
# Setting type: Single
# Default value: 0.167
InsanityRateInFacility = 0.167

## Insanity lost per second outdoors (daytime).
# Setting type: Single
# Default value: 0.8
InsanityDecayOutdoor = 0.8

## Insanity gained per second outdoors at night. Set to 0 to disable.
# Setting type: Single
# Default value: 0.05
NightOutdoorRate = 0.05

## Game hour (0-23) at which night begins outdoors.
# Setting type: Int32
# Default value: 19
NightStartHour = 19

## Insanity gained per second outdoors during Eclipse weather.
# Setting type: Single
# Default value: 0.1
EclipseOutdoorRate = 0.1

## Insanity gained per second outdoors during Paranoia weather.
# Setting type: Single
# Default value: 0.1
ParanoiaOutdoorRate = 0.1

## Insanity reduced per second while on the Company building moon (71 Gordion).
# Setting type: Single
# Default value: 0.5
CompanyMoonDecayRate = 0.5

## Insanity per second on the ship while ship lights are ON. Negative reduces, positive increases.
# Setting type: Single
# Default value: -0.3
RateOnShipLightsOn = -0.3

## Insanity per second on the ship while ship lights are OFF. Negative reduces, positive increases.
# Setting type: Single
# Default value: 0.15
RateOnShipLightsOff = 0.15

[Paranoia]

## Insanity rate multiplier when Paranoia weather is active.
# Setting type: Single
# Default value: 1.2
ParanoiaMultiplier = 1.2

## Spawn weight for Paranoia weather (other weathers are 100, so ~3% per night at 20).
# Setting type: Int32
# Default value: 20
ParanoiaSpawnWeight = 20

[Reactions]

## Multiplier for insanity gained per second per visible enemy (per-type rates are scaled by this).
# Setting type: Single
# Default value: 1
MobVisibilityScale = 1

## Max distance (m) at which a visible enemy contributes to insanity.
# Setting type: Single
# Default value: 30
MobVisibilityRange = 30

## Insanity-rate reduction per second when at least one living teammate is nearby.
# Setting type: Single
# Default value: 0.15
TeammateBuffRate = 0.15

## Max distance (m) for the teammate proximity buff.
# Setting type: Single
# Default value: 6
TeammateBuffRange = 6

## Insanity-rate reduction per second when player is illuminated (own flashlight on, or in ship).
# Setting type: Single
# Default value: 0.1
LightBuffRate = 0.1

## Instant insanity gain when a teammate dies in your line of sight.
# Setting type: Single
# Default value: 25
DeathWitnessSpike = 25

## Max distance (m) for the death witness check.
# Setting type: Single
# Default value: 40
DeathWitnessRange = 40

## Insanity % above which the host slightly raises Ghost Girl haunt chance (set high to disable).
# Setting type: Single
# Default value: 80
GhostGirlBoostThreshold = 80

## Insanity % at which voice distortion + recorded teammate voice playback start.
# Setting type: Single
# Default value: 70
VoiceHauntThreshold = 70

## Max distance (m) to a facility light for the light proximity buff.
# Setting type: Single
# Default value: 8
LightProximityRange = 8

## Instant insanity gain when the apparatus is removed. Also disables insanity-reduction buffs inside the facility for the rest of the round.
# Setting type: Single
# Default value: 15
ApparatusSpike = 15

## If true, reaching 100% insanity transforms the player into a Masked enemy.
# Setting type: Boolean
# Default value: true
EnableMaskedTransform = true

## If true, the 100% Masked transformation only triggers when Paranoia weather is active.
# Setting type: Boolean
# Default value: true
MaskedTransformOnlyDuringParanoia = true

## Insanity gained per second while the local player is underwater.
# Setting type: Single
# Default value: 0.4
UnderwaterRate = 0.4

## Insanity reduced per second while the local player has an active TZP-Inhalant effect.
# Setting type: Single
# Default value: 1
TZPInsanityDrainRate = 1

[VFX]

## Insanity % at which the tunnel-vision overlay starts.
# Setting type: Single
# Default value: 80
TunnelVisionThreshold = 80

## Tunnel vision overlay color (hex). Default is very dark red. Use #000000 for pure black.
# Setting type: String
# Default value: #180202
TunnelVisionColor = #180202

## If true, the insanity HUD ring is hidden while insanity is 0%.
# Setting type: Boolean
# Default value: false
HideHudAtZero = false

## Master switch for the insanity HUD ring. Set to false to disable it entirely (no canvas/sprite created).
# Setting type: Boolean
# Default value: true
EnableHud = false

