# Default value: true
Sales tag = true

## Moon Group Matching only: display a tag to indicate groups a moon belongs to. Limited to custom group and LLL tag matching methods.
# Setting type: Boolean
# Default value: true
Group tag = true

[2 - Unlock Mode (Default)]

