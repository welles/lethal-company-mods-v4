Malfunctions navigation buys moon = false

## When enabled and Galetry (from Wesley's moons journey) is available and routable, LMU will auto reroute the ship to Galetry instead of Gordion (the company).
# Setting type: Boolean
# Default value: true
Prefer Galetry over Gordion = true

