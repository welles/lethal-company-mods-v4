[6.1 - Cheap Moon Bias]

## Use Cheap Moon Bias when selecting moons for the paid moon rotation when it's shuffled.
# Setting type: Boolean
# Default value: true
Discovery Mode paid rotation = true

## Controls how strongly cheaper moons are favored when Cheap Moon Bias is enabled.
## LMU compares each moon's price against the average price of the current candidate pool and turns that into a selection weight.
## 0.0 gives all candidates equal weight.
## 1.0 uses inverse-price weighting, so a 100 credit moon is 4x as likely as a 400 credit moon.
## 2.0 squares that effect, so the same 100 credit moon is 16x as likely as the 400 credit moon.
## Values between 0.0 and 1.0 soften the bias. Values above 1.0 strengthen it.
## The calculation uses original prices or current prices depending on the Ignore price changes setting.
# Setting type: Single
# Default value: 0.66
# Acceptable value range: From 0 to 2
Discovery Mode paid rotation bias value = 0.66

## Use Cheap Moon Bias when selecting moons during Quota Discovery.
# Setting type: Boolean
# Default value: true
Quota Discovery = true

